<div class="sidebar" xmlns:th="http://www.thymeleaf.org" th:fragment="menu(currentPath)">
    <div class="sidebar-header">
        <a th:href="@{/home}" href="/home" class="sidebar-logo">
            <img th:src="@{/theme/assets/img/logo-onest-smartlogistics.png}" src="/theme/assets/img/logo-onest-smartlogistics.png" alt="Onest Smart Logistics" style="max-height: 40px; width: auto;">
        </a>
    </div>
    <div id="sidebarMenu" class="sidebar-body">
        <div class="nav-group show">
            <a href="javascript:void(0)" class="nav-label">Portal Salud</a>
            <ul class="nav nav-sidebar">
                <li class="nav-item">
                    <a th:href="@{/nss}" href="/nss" class="nav-link" th:classappend="${currentPath == '/nss'} ? ' active' : ''"><i class="ri-user-search-line"></i> <span>Busqueda NSS</span></a>
                </li>
                <!-- Modulos del expediente (U02). Oculto hasta que una busqueda NSS
                     encuentre empleado; el submenu se inyecta via /api/nss/modules. -->
                <li class="nav-item" id="nssModulesGroup" style="display: none;">
                    <a href="javascript:void(0)" class="nav-link has-sub"><i class="ri-booklet-line"></i> <span>Expediente General</span></a>
                    <nav class="nav nav-sub" id="nssModulesSub"></nav>
                </li>
            </ul>
        </div>      
    </div>
    <div class="sidebar-footer">
        <div class="sidebar-footer-top">
            <div class="sidebar-footer-thumb">
                <img th:src="@{${currentUserAvatar}}"   alt="avatar usuario" onerror="this.onerror=null;this.src='/theme/assets/img/img1.jpg';">
            </div>
            <div class="sidebar-footer-body">
                <h6><a href="javascript:void(0)" th:text="${currentUserName}">Usuario del portal</a></h6>
                <p th:text="${currentUserRole}">Perfil pendiente</p>
            </div>
            <a id="sidebarFooterMenu" href="javascript:void(0)" class="dropdown-link"><i class="ri-arrow-down-s-line"></i></a>
        </div>
        <div class="sidebar-footer-menu">
            <nav class="nav">
                <a href="javascript:void(0)"><i class="ri-edit-2-line"></i> Edit Profile</a>
                <a href="javascript:void(0)"><i class="ri-profile-line"></i> View Profile</a>
            </nav>
            <hr>
            <nav class="nav">
                <a href="javascript:void(0)"><i class="ri-question-line"></i> Help Center</a>
                <a href="javascript:void(0)"><i class="ri-lock-line"></i> Privacy Settings</a>
                <a href="javascript:void(0)"><i class="ri-user-settings-line"></i> Account Settings</a>
                <form th:action="@{/logout}" action="/logout" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <a href="javascript:void(0)" onclick="this.closest('form').submit(); return false;"><i class="ri-logout-box-r-line"></i> Log Out</a>
                </form>
            </nav>
        </div>
    </div>
</div>
