<th:block xmlns:th="http://www.thymeleaf.org" th:fragment="appScripts(pageScripts)">
    <script th:src="@{/theme/lib/jquery/jquery.min.js}" src="/theme/lib/jquery/jquery.min.js"></script>
    <script th:src="@{/theme/lib/bootstrap/js/bootstrap.bundle.min.js}" src="/theme/lib/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/theme/lib/perfect-scrollbar/perfect-scrollbar.min.js}" src="/theme/lib/perfect-scrollbar/perfect-scrollbar.min.js"></script>
    <script th:src="@{/theme/assets/js/script.js}" src="/theme/assets/js/script.js"></script>
    <th:block th:replace="${pageScripts}"></th:block>
</th:block>

<th:block xmlns:th="http://www.thymeleaf.org" th:fragment="authScripts(pageScripts)">
    <script th:src="@{/theme/lib/jquery/jquery.min.js}" src="/theme/lib/jquery/jquery.min.js"></script>
    <script th:src="@{/theme/lib/bootstrap/js/bootstrap.bundle.min.js}" src="/theme/lib/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script>
        'use strict';

        var skinMode = localStorage.getItem('skin-mode');
        if (skinMode) {
            $('html').attr('data-skin', 'dark');
        }
    </script>
    <th:block th:replace="${pageScripts}"></th:block>
</th:block>
