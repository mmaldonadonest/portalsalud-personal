<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="Portal Salud Personal login">
    <meta name="author" content="Portal Salud Personal">
    <link rel="shortcut icon" type="image/x-icon" th:href="@{/theme/assets/img/favicon.png}" href="/theme/assets/img/favicon.png">
    <title>Login | Portal Salud Personal</title>
    <link rel="stylesheet" th:href="@{/theme/lib/remixicon/fonts/remixicon.css}" href="/theme/lib/remixicon/fonts/remixicon.css">
    <link rel="stylesheet" th:href="@{/theme/assets/css/style.min.css}" href="/theme/assets/css/style.min.css">
</head>
<body class="page-sign d-block py-0">

    <div class="row g-0">
        <div class="col-md-7 col-lg-5 col-xl-4 col-wrapper">
            <div class="card card-sign">
                <div class="card-header">
                    <a th:href="@{/login}" href="/login" class="header-logo mb-5" th:text="${appName}">Portal Salud Personal</a>
                    <h3 class="card-title">Iniciar sesión</h3>
                    <p class="card-text">Bienvenido nuevamente. Ingresa tu usuario o correo y contraseña para continuar.</p>
                </div>
                <div class="card-body">
                    <div class="alert alert-danger" th:if="${param.error}">Credenciales inválidas. Verifica tus datos.</div>
                    <div class="alert alert-success" th:if="${param.logout}">Tu sesión ha finalizado correctamente.</div>
                    <form th:action="@{/login}" action="/login" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <div class="mb-4">
                            <label class="form-label" for="username">Usuario o correo</label>
                            <input id="username" name="username" type="text" class="form-control" placeholder="Ingresa tu usuario o correo" required autocomplete="username">
                        </div>
                        <div class="mb-4">
                            <label class="form-label d-flex justify-content-between" for="password">Contraseña <a href="javascript:void(0)">¿Olvidaste tu contraseña?</a></label>
                            <input id="password" name="password" type="password" class="form-control" placeholder="Ingresa tu contraseña" required autocomplete="current-password">
                        </div>
                        <button class="btn btn-primary btn-sign" type="submit">Entrar</button>
                    </form>

                    <div class="divider"><span>o continúa con</span></div>

                    <div class="row gx-2">
                        <div class="col"><button class="btn btn-facebook" type="button"><i class="ri-facebook-fill"></i> Facebook</button></div>
                        <div class="col"><button class="btn btn-google" type="button"><i class="ri-google-fill"></i> Google</button></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col d-none d-lg-block">
            <img th:src="@{/theme/assets/img/bg1.jpg}" src="/theme/assets/img/bg1.jpg" class="auth-img" alt="Portal Salud Personal">
        </div>
    </div>

    <script th:src="@{/theme/lib/jquery/jquery.min.js}" src="/theme/lib/jquery/jquery.min.js"></script>
    <script th:src="@{/theme/lib/bootstrap/js/bootstrap.bundle.min.js}" src="/theme/lib/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script>
        'use strict';

        var skinMode = localStorage.getItem('skin-mode');
        if (skinMode) {
            $('html').attr('data-skin', 'dark');
        }
    </script>
</body>
</html>
