spring.profiles.active=test
spring.application.name=portal-salud
server.port=8080
server.servlet.context-path=/

# Charset UTF-8 expl\u00c3\u00adcito en respuestas HTTP
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Estrategia de nombres para forzar snake_case en Oracle 21c
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# Configuraci\u00f3n estricta de DDL (Usa Flyway para migrar, Hibernate solo valida)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Dialecto optimizado para Oracle
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect

# Cache-control para recursos est\u00c3\u00a1ticos (CSS, JS, im\u00c3\u00a1genes del tema)
# Estrategia de versionado por contenido para cache busting autom\u00c3\u00a1tico
# Las expresiones @{} de Thymeleaf generan URLs con hash del contenido (ej: /css/login-abc123.css)
spring.web.resources.chain.enabled=true
spring.web.resources.chain.strategy.content.enabled=true
spring.web.resources.chain.strategy.content.paths=/**
spring.web.resources.cache.cachecontrol.max-age=30d
spring.web.resources.cache.cachecontrol.cache-public=true
