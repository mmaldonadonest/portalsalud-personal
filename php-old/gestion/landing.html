<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestión de Aplicaciones</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="css/bootstrap.css" />
    <link
      rel="stylesheet"
      href="https://cdn.datatables.net/1.11.5/css/dataTables.bootstrap5.min.css"
    />
    <script
      src="https://code.jquery.com/jquery-3.7.1.js"
      integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4="
      crossorigin="anonymous"
    ></script>
    <script
      src="http://salud.onestcloud.mx:70/node_modules/lottiefiles/dotlottie-player.js"
      type="module"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.datatables.net/1.10.24/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.11.5/js/dataTables.bootstrap5.min.js"></script>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-light" data-bs-theme="light">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Modulo de asignación</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarColor03"
          aria-controls="navbarColor03"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarColor03">
          <ul class="navbar-nav me-auto">
            <li class="nav-item">
              <a class="nav-link" href="#" onclick="showAltaMenus()"
                >Alta de apps</a
              >
            </li>
          </ul>
          <div class="d-flex">
            <input
              class="form-control me-sm-2"
              type="search"
              id="nssInput"
              placeholder="Buscar NSS"
            />
            <button
              class="btn btn-secondary my-2 my-sm-0"
              onclick="showUser()"
              type="button"
            >
              Buscar
            </button>
          </div>
        </div>
      </div>
    </nav>
    <br />
    <div class="p-5 mb-4 bg-light rounded-3">
      <div class="container-fluid py-5">
        <center>
          <h1 class="display-5 welcome">¡Bienvenido Administrador!</h1>
        </center>

        <div class="d-flex d-flex justify-content-center welcome">
          <div class="col-4 col-md-3 welcome">
            <dotlottie-player
              src="https://lottie.host/57d20029-64aa-4307-904a-160acbb50042/nItWeI7GN1.json"
              background="transparent"
              speed="1"
              style="width: 100%"
              loop
              autoplay
            ></dotlottie-player>
          </div>
        </div>

        <center>
          <p class="lead welcome">Modulo de asignación de permisos.</p>
        </center>

        <div id="respuesta"></div>
      </div>
    </div>
    <footer class="text-center text-white fixed-bottom bg-dark">
      <!-- Grid container -->

      <!-- Grid container -->

      <!-- Copyright -->
      <div class="text-center p-3" style="background-color: rgba(0, 0, 0, 0.2)">
        © 2023 ONEST
        <a class="text-white" href="https://mdbootstrap.com/">Cerrar sesión</a>
      </div>
      <!-- Copyright -->
    </footer>

    <!-- Modal Body -->
    <!-- if you want to close by clicking outside the modal, delete the last endpoint:data-bs-backdrop and data-bs-keyboard -->
    <div
      class="modal fade"
      id="modalId"
      tabindex="-1"
      data-bs-backdrop="static"
      data-bs-keyboard="false"
      role="dialog"
      aria-labelledby="modalTitleId"
      aria-hidden="true"
    >
      <div
        class="modal-dialog modal-dialog-scrollable modal-dialog-centered modal-sm"
        role="document"
      >
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="modalTitleId">Alta Menu</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="idAppModal" />
            <div class="mb-3">
              <label for="" class="form-label">Id Menu</label>
              <input
                type="number"
                class="form-control"
                name="IdMenuM"
                id="IdMenuM"
                aria-describedby="helpId"
                placeholder=""
              />
            </div>
            <div class="mb-3">
              <label for="" class="form-label">Nombre del menu</label>
              <input
                type="text"
                class="form-control"
                name="idNombreM"
                id="idNombreM"
                aria-describedby="helpId"
                placeholder=""
              />
            </div>
            <div class="mb-3">
              <label for="" class="form-label">Id Rol</label>
              <input
                type="Number"
                class="form-control"
                name="idRolM"
                id="idRolM"
                aria-describedby="helpId"
                placeholder=""
              />
            </div>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Cerrar
            </button>
            <button
              type="button"
              onclick="guardarMenu()"
              class="btn btn-primary"
            >
              Guardar
            </button>
          </div>
        </div>
      </div>
    </div>
    <div
      class="modal fade"
      id="modalROL"
      tabindex="-1"
      data-bs-backdrop="static"
      data-bs-keyboard="false"
      role="dialog"
      aria-labelledby="modalTitleId"
      aria-hidden="true"
    >
      <div
        class="modal-dialog modal-dialog-scrollable modal-dialog-centered modal-sm"
        role="document"
      >
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="modalTitleId">Alta Rol</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="idAppModalRol" />
            <div class="mb-3">
              <label for="" class="form-label">Id ROL</label>
              <input
                type="number"
                class="form-control"
                name="IdROLM"
                id="IdROLM"
                readonly
                aria-describedby="helpId"
                placeholder=""
              />
            </div>
            <div class="mb-3">
              <label for="" class="form-label">Nombre del Rol</label>
              <input
                type="text"
                class="form-control"
                name="idNombreMROL"
                id="idNombreMROL"
                aria-describedby="helpId"
                placeholder=""
              />
            </div>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Cerrar
            </button>
            <button
              type="button"
              onclick="guardarROL()"
              class="btn btn-primary"
            >
              Guardar
            </button>
          </div>
        </div>
      </div>
    </div>
    <div
      class="modal fade"
      id="modalModules"
      tabindex="-1"
      aria-labelledby="exampleModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-xl">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="exampleModalLabel">Alta de modulos</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <div id="divRespuesta"></div>
            <br />
            <div class="mb-3">
              <label for="" class="form-label">Id módulo</label>
              <input type="hidden" id="idrolModulo" />
              <input
                readonly
                type="number"
                class="form-control"
                name="idModuloInput"
                id="idModuloInput"
                aria-describedby="helpId"
                placeholder="Id"
              />
            </div>
            <br />
            <div class="mb-3">
              <label for="" class="form-label"
                >Nombre del módulo a dar de alta</label
              >
              <input
                type="text"
                class="form-control"
                name="nombreModuloIn"
                id="nombreModuloIn"
                aria-describedby="helpId"
                placeholder="Nombre"
                onchange="guardarMenuDos()"
              />
            </div>
            <div class="container mt-4">
              <h2>Modulos asignados</h2>
              <div class="table-responsive">
                <table class="table mt-2" style="border-radius: 10px;" id="tablaRol">
                  <thead style="border-radius: 10px;">
                    <tr>
                      <th>ID Menu</th>
                      <th>Nombre Menu</th>
                      
                      <th>Borrar</th>
                    </tr>
                  </thead>
                  <tbody id="tabla-body">
                    <!-- Aquí se agregarán las filas con datos JSON -->
                  </tbody>
                </table>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Cerrar
            </button>
          </div>
        </div>
      </div>
    </div>
    <!-- Optional: Place to the bottom of scripts -->
    <script>
      const myModal = new bootstrap.Modal(
        document.getElementById("modalId"),
        options
      );
    </script>
  </body>
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
    crossorigin="anonymous"
  ></script>
  <script src="./js/main.js"></script>
</html>
